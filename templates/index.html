<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Tickers MACD PRO</title>
    <style>
        body { font-family: Arial; margin: 2em; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 1em; }
    </style>
</head>
<body>
    <h1>Tickers monitoreados</h1>
    <div style="margin-bottom: 1em;">
        <a href="/signals" style="background-color: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block;">📊 Ver Histórico de Señales</a>
    </div>
    <table>
        <tr><th>Símbolo</th><th>Activo</th><th>Timeframe</th><th>Acciones</th></tr>
        {% for t in tickers %}
        <tr>
            <td>{{ t.symbol }}</td>
            <td>{{ t.active }}</td>
            <td>{{ t.timeframe }}</td>
            <td>
                <a href="/edit/{{ t.symbol }}">Editar</a> |
                <a href="/delete/{{ t.symbol }}" onclick="return confirm('¿Eliminar?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <h2>Agregar nuevo ticker</h2>
    <form method="post" action="/add">
        <div class="form-group"><label>Símbolo (ej: BTC/USDT):</label><input name="symbol" required></div>
        <div class="form-group"><label>Activo:</label>
            <select name="active"><option value="True">Sí</option><option value="False">No</option></select>
        </div>
        <div class="form-group"><label>Timeframe (1h, 15m, 4h):</label><input name="timeframe" value="1h" required></div>
        <button type="submit">Agregar</button>
    </form>
</body>
</html>
